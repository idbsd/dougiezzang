<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="day4.css"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <div class="header__all">
                <i class="fa-solid fa-x"></i>
            </div>
            <div class="header__all">Playlist</div>
            <div class="header__all"></div>
        </div>
        <div class="playlist">
            <div class="playlist__icon">
                <i class="fa-solid fa-image"></i>
            </div>
            <div class="playlist__text">
                <div class="title">Random Love</div>
                <div class="artist">by Divay Kapoor</div>
            </div>
        </div>
        <div class="btn">
            <div class="btn__play">
                <i class="fa-solid fa-play"></i>
                <span>Play</span>
            </div>
            <div class="btn__heart">
                <i class="fa-solid fa-heart"></i>
            </div>
            <div class="btn__plus">
                <i class="fa-solid fa-plus"></i>
            </div>
        </div>
        <ul class="list">
            <li class="list__list">
                <div class="red"></div>
                <div class="list__text">
                    <div class="list__title">Matargasti</div>
                    <div class="list__artist">Mohit Chauhan</div>
                </div>
            </li>
            <li class="list__list">
                <div class="pink"></div>
                <div class="list__text"> 
                    <div class="list__title">Attitude</div>
                    <div class="list__artist">Lewis Ofman·Attitude</div>
                </div>
            </li>
            <li class="list__list">
                <div class="blue"></div>
                <div class="list__text">
                    <div class="list__title">Try Everthing</div>
                    <div class="list__artist">Shakira·Zootopia</div>
                </div>
            </li>
            <li class="list__list">
                <div class="green"></div>
                <div class="list__text">
                    <div class="list__title">Sunflower</div>
                    <div class="list__artist">Joseph Vincent·Sunflower</div>
            </div>
            </li>
        </ul>
        <script src="https://kit.fontawesome.com/d287dc2b99.js" crossorigin="anonymous"></script>
    </div>

</body>
</html>
