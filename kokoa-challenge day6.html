<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Kokoa Challenge</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="day6.css" />
  </head>
  <body>
    <header class="library">
        <div class="library__menu">
            <i class="fa-solid fa-bars fa-lg"></i>
        </div>
        <div class="library__menu">
            library
        </div>
        <div class="library__menu">
            <i class="fa-solid fa-bag-shopping fa-lg"></i>
        </div>
    </header>
    <search>
        <div class="search">
            <input class="search__search" type="search" placeholder="Search Books..."/>
            <a class="search__btn" href="#"><i class="fa-solid fa-magnifying-glass fa-lg"></i></a>
        </div>
    </search>
    <main>
        <section>
            <div id="bookday">Book of the day</div>
            <div class="book">
                <div class="book__img"><img src="https://m.media-amazon.com/images/I/81elboRK2BL._AC_UF1000,1000_QL80_.jpg"/></div>
                <div class="book__text">
                    <div class="book__text__title">No Fixed Abode</div>
                    <div class="book__text__writer">Journey Through</div>
                    <div class="book__text__star">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>
                    <div class="book__text__tag">
                        <div class="tag">Journey</div>
                        <div class="tag">Biography</div>
                    </div>
                    <div class="book__text__etc">
                        <div class="text__mark"><i class="fa-solid fa-bookmark"></i></div>
                        <div class="text__etc">Book Now</div>
                    </div>
                </div>
            </div>
        </section>
        <section>
            <div>
                <div id="adventures">Top Adventures</div>
                <div class="adventures">                   
                    <div class="adventures__img">
                        <img src="https://contents.kyobobook.co.kr/sih/fit-in/458x0/pdt/9780525556084.jpg"/>
                        <div class="adventures__star">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                    <div class="adventures__img">
                        <img src="https://upload.wikimedia.org/wikipedia/en/1/1d/Thejunglebook_movieposter.jpg"/>
                        <div class="adventures__star">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                    <div class="adventures__img">
                        <img src="https://prodimage.images-bn.com/pimages/9781435144484_p0_v1_s600x595.jpg"/>
                        <div class="adventures__star">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                    <div class="adventures__img">
                        <img src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1541083701i/42519279.jpg"/>
                        <div class="adventures__star">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section>
            <div id="popular">Popular authors</div>
            <div class="pop">
                <div class="popular__img">
                    <div><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsHF3e8CvrnP0EXkintR4U13Nlc9V39tg5HA&s"></div>
                </div>
                <div class="popular">
                    <div class="popular__title">George Raymond Richard Martin</div>
                    <div class="popular__text">Modern American science fiction writer, screenwriter, producer and editor. winner of many literary awards.</div>
                </div>
            </div>
        </section>
    </main>
    <!-- ❌ DON'T DELETE THIS OR WORRY ABOUT THIS 👇🏻 ❌ -->
    <script src="https://kit.fontawesome.com/d287dc2b99.js"     
            crossorigin="anonymous"></script>
  </body>
</html>
