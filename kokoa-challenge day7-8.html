<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"  href="day7-8.css"/>
</head>
<body>
    <main class="box2">
        <section class="tyler">
            <header class="tyler__btn">
                <i href="#" class="fa-solid fa-arrow-left fa-2x"></i>
                <i href="#" class="fa-solid fa-magnifying-glass fa-2x"></i>
            </header>
            <div class="tyler__info">
                <img class="tyler__img" src="https://static.wikia.nocookie.net/hiphopdatabase/images/9/9f/Tyler%2C_the_Creator.jpg/revision/latest?cb=20200824223405"/>
                <h2 class="tyler__title">Tyler, The Creator</h2>
                <div class="tyler__subtitle">Rap, Hip-hop</div>
            </div>
            <div class="tyler__middle__btn">
                <div class="mid__btn1">Shuffle</div>
                <div class="mid__btn2">
                    <i class="fa-solid fa-heart"></i>
                    <div>212971</div>
                </div>
            </div>
            <div class="list">
                <div class="song">
                    <img class="song__img" src="https://i.scdn.co/image/ab67616d0000b27330a635de2bb0caa4e26f6abb"/>
                    <div>
                        <div class="song__artist">Tyler, the Creator</div>
                        <div class="song__title">EARFQUAKE</div>
                    </div>
                    <div class="song__icon">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
                <div class="song">
                    <img class="song__img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHvpu9gIT7XD2ifsEezoQZ8O3G7vhHFHD_Sg&s"/>
                    <div>
                        <div class="song__artist">Tyler, the Creator</div>
                        <div class="song__title">NOVEMBER</div>
                    </div>
                    <div class="song__icon">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
                <div class="song">
                    <img class="song__img" src="https://images.genius.com/dba01b59707f3f1ace76dc6c3ae8a91f.1000x1000x1.png"/>
                    <div>
                        <div class="song__artist">Tyler, the Creator</div>
                        <div class="song__title">911</div>
                    </div>
                    <div class="song__icon">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
                <div class="song">
                    <img class="song__img" src="https://i.scdn.co/image/ab67616d0000b273913f492347e1585748450855"/>
                    <div>
                        <div class="song__artist">Tyler, the Creator</div>
                        <div class="song__title">WOLF</div>
                    </div>
                    <div class="song__icon">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
            </div>
            <div class="player">
                <div class="player__info">
                    <div class="player__info__artist">Tyler, The Creator</div>
                    <div class="player__info__title">NOVEMBER</div>
                </div>
                <div class="player__btn">
                    <i class="fa-solid fa-backward-step"></i>
                    <i class="fa-solid fa-pause"></i>
                    <i class="fa-solid fa-forward-step"></i>
                </div>
            </div>
        </section>
        <section class="playing">
            <header class="playing__btn">
                <i href="#" class="fa-solid fa-arrow-left fa-2x"></i>
                <i href="#" class="fa-solid fa-ellipsis-vertical fa-2x"></i>
            </header>
            <div class="playing__info">
                <img class="playing__img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHvpu9gIT7XD2ifsEezoQZ8O3G7vhHFHD_Sg&s"/>
                <div class="playing__title">November</div>
                <div class="playing__artist">Tyler, The Creator</div>
            </div>
            <div class="playing__run">
                <div class="playing__time">
                    <div>1:56</div>
                    <div>2:21</div>
                </div>
                <div class="playing__bar">
                    <div class="bar"></div>
                    <div class="thumb"></div>
                </div>
            </div>
            <div class="control">
                <i class="fa-solid fa-repeat"></i>
                <i class="fa-solid fa-backward-step"></i>
                <div class="control__play"><i class="fa-solid fa-play"></i></div>
                <i class="fa-solid fa-forward-step"></i>
                <i class="fa-solid fa-shuffle"></i>
            </div>

        </section>
    </main>
</body>
<script src="https://kit.fontawesome.com/d287dc2b99.js"     
        crossorigin="anonymous">
</script>
</html>
